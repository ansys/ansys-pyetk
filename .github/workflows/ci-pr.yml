name: CI - Pull Request
on:
  # By default, a workflow only runs when a pull_request event's activity type is opened, synchronize, or reopened.
  # To retrigger the workflow when the PR's title is edited we need to specify the types explicitly.
  # See https://docs.github.com/en/actions/reference/workflows-and-actions/events-that-trigger-workflows#pull_request
  pull_request:
    types: [opened, reopened, synchronize, edited]

env:
  ANSYSLMD_LICENSE_FILE: ${{ format('1055@{0}', secrets.LICENSE_SERVER) }}
  MAIN_PYTHON_VERSION: '3.10'
  DOCUMENTATION_CNAME: 'etk.docs.pyansys.com'
  LIBRARY_NAME: 'ansys-pyetk'
  ON_CI: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Disable all default permissions at workflow level for security (least privilege principle)
# Individual jobs will explicitly request only the permissions they need
permissions: {}

jobs:

  # NOTE: We do not allow dependabot to trigger the CI/CD pipeline automatically.
  # This is to mitigate supply chain attacks, where a malicious dependency update
  # could execute arbitrary code in our build environment.
  # Dependabot PRs must be reviewed carefully and approved manually before
  # running the CI.
  block-dependabot:
    name: "Block dependabot (on dependabot PR)"
    runs-on: ubuntu-latest
    steps:
      - name: Exit if dependabot triggered the workflow # zizmor: ignore[bot-conditions] safe ignore because we exit if dependabot is triggering the action
        if: github.triggering_actor == 'dependabot[bot]'
        run: |
          echo "::warning::Dependabot is not allowed to trigger this workflow. Please review carefully the changes before running the workflow manually."
          exit 1

  # NOTE: We do not allow pyansys-ci-bot to trigger the CI/CD pipeline automatically
  # on dependabot's PR. This is to mitigate supply chain attacks, where a malicious
  # dependency update could execute arbitrary code in our build environment.
  # Dependabot PRs must be reviewed carefully and approved manually before
  # running the CI.
  block-pyansys-ci-bot:
    name: "Block PyAnsys-CI-bot (on dependabot PR)"
    needs: block-dependabot
    runs-on: ubuntu-latest
    steps:
      - name: Exit if pyansys-ci-bot triggered the workflow on dependabot's PR
        if: github.triggering_actor == 'pyansys-ci-bot' && startsWith(github.head_ref, 'dependabot')
        run: |
          echo "::warning::PyAnsys CI bot is not allowed to trigger this workflow in dependabot's PR. Please review carefully the changes before running the workflow manually."
          exit 1

  actions-security:
    name: Check actions security
    runs-on: ubuntu-latest
    needs: block-pyansys-ci-bot
    permissions:
      contents: read   # Required to read workflow files and check for security issues
    steps:
      - uses: ansys/actions/check-actions-security@2a2b198b65c63adb69c0d032d180e4dc728d4809 # v10.2.9
        with:
          generate-summary: true
          token: ${{ secrets.GITHUB_TOKEN }}
          auditing-level: 'high'

  pr-title:
    name: Check the title of the PR
    runs-on: ubuntu-latest
    needs: block-pyansys-ci-bot
    permissions:
      pull-requests: read   # Required to read PR metadata
    steps:
      - name: Check the title of the pull request
        uses: ansys/actions/check-pr-title@2a2b198b65c63adb69c0d032d180e4dc728d4809 # v10.2.9
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          use-upper-case: true

  labeler:
    name: Set labels
    needs: pr-title
    permissions:
      contents: read        # Required to read repository files and .github/labeler.yml configuration
      pull-requests: write  # Required to add/modify labels on pull requests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          clean: true
          persist-credentials: false

      - name: Update labels
        uses: micnncim/action-label-syncer@3abd5ab72fda571e69fffd97bd4e0033dd5f495c # v1.3.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Label pull-request
        uses: actions/labeler@634933edcd8ababfe52f92936142cc22ac488b1b # v6.0.1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

  changelog-fragment:
    name: Create changelog fragment
    needs: labeler
    permissions:
      contents: write # Read the pull-request title
      pull-requests: write # Write a fragment file in the pull-request
    runs-on: ubuntu-latest
    steps:
      - uses: ansys/actions/doc-changelog@2a2b198b65c63adb69c0d032d180e4dc728d4809 # v10.2.9
        with:
          token: ${{ secrets.PYANSYS_CI_BOT_TOKEN }}
          use-pull-request-title: true
          use-default-towncrier-config: true
          bot-user: ${{ secrets.PYANSYS_CI_BOT_USERNAME }}
          bot-email: ${{ secrets.PYANSYS_CI_BOT_EMAIL }}

  # TODO: To remove once public and use precommit.ci
  code-style:
    name: Code style check
    runs-on: ubuntu-latest
    needs: pr-title
    permissions:
      contents: read   # Required to read code files for style checking
    steps:
      - uses: ansys/actions/code-style@2a2b198b65c63adb69c0d032d180e4dc728d4809 # v10.2.9
        with:
          python-version: ${{ env.MAIN_PYTHON_VERSION }}
          use-python-cache: false

  build-application-windows:
    name: Build Windows application
    runs-on: windows-latest
    needs: code-style
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/build-windows-app
        with:
          artifact-name: 'PyETK-Installer-Windows'
          python-version: ${{ env.MAIN_PYTHON_VERSION }}

  build-application-linux-debian:
    name: Build Linux application - Ubuntu ${{ matrix.os }}
    runs-on: ubuntu-${{ matrix.os }}
    needs: code-style
    strategy:
      matrix:
        os: [ "22.04", "24.04" ]
      fail-fast: false
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/build-linux-app
        with:
          artifact-name: 'PyETK-Installer-ubuntu_${{ matrix.os }}'
          python-version: ${{ env.MAIN_PYTHON_VERSION }}
          ubuntu-version: ${{ matrix.os }}

  doc-style:
    name: Documentation style check
    runs-on: ubuntu-latest
    needs: pr-title
    permissions:
      contents: read   # Required to read documentation files for style checking
    steps:
      - name: Check documentation style
        uses: ansys/actions/doc-style@2a2b198b65c63adb69c0d032d180e4dc728d4809 # v10.2.9
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fail-level: 'warning'

  doc-build:
    name: Documentation build
    runs-on: [self-hosted, Windows, pyaedt-toolkit]
    needs: doc-style
    permissions:
      contents: read
    steps:
      - name: Build documentation
        uses: ansys/actions/doc-build@2a2b198b65c63adb69c0d032d180e4dc728d4809 # v10.2.9
        with:
          add-pdf-html-docs-as-assets: true
          check-links: false
          python-version: ${{ env.MAIN_PYTHON_VERSION }}
          sphinxopts: '-j auto --color -w build_errors.txt'
          use-python-cache: false

  smoke-tests:
    name: Build and smoke tests
    needs: code-style
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os : [windows-latest, ubuntu-latest]
        python-version: ['3.10', '3.11', '3.12', '3.13']
    permissions:
      attestations: write   # Required to create and publish build attestations (SLSA provenance)
      contents: read        # Required to read repository content for building
      id-token: write       # Required for OIDC token generation (for provenance signing)
    steps:
      - uses: ansys/actions/build-wheelhouse@2a2b198b65c63adb69c0d032d180e4dc728d4809 # v10.2.9
        with:
          library-name: ${{ env.LIBRARY_NAME }}
          operating-system: ${{ matrix.os }}
          python-version: ${{ matrix.python-version }}
          whitelist-license-check: 'fpdf2 PySide6 PySide6_Addons PySide6_Essentials shiboken6'

# # =================================================================================================
# # vvvvvvvvvvvvvvvvvvvvvvvvvvvvvv    RUNNING ON SELF-HOSTED RUNNER    vvvvvvvvvvvvvvvvvvvvvvvvvvvvvv
# # =================================================================================================

  tests-windows:
    name: Windows tests
    needs: smoke-tests
    runs-on: [self-hosted, Windows, pyaedt-toolkit]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.MAIN_PYTHON_VERSION }}

      - name: Create Python venv
        run: |
          python -m venv .venv
          .\.venv\Scripts\Activate.ps1

      - name: Install packages for testing
        run: |
          .\.venv\Scripts\Activate.ps1
          python -m pip install --upgrade pip
          pip install .[tests]

      - name: Toolkit REST API testing
        timeout-minutes: 30
        run: |
          .\.venv\Scripts\Activate.ps1
          pytest -v -m rest --cov=ansys.aedt.toolkits.electronic_transformer --cov-append

      - name: Toolkit Backend API testing
        timeout-minutes: 30
        run: |
          .\.venv\Scripts\Activate.ps1
          pytest -v -m backend --cov=ansys.aedt.toolkits.electronic_transformer --cov-append

      - name: Toolkit Frontend testing
        timeout-minutes: 30
        run: |
          .\.venv\Scripts\Activate.ps1
          pytest -v -m frontend --cov=ansys.aedt.toolkits.electronic_transformer --cov-append

      - name: Combine coverage files
        run: |
          .\.venv\Scripts\Activate.ps1
          python -m coverage html -d .cov\total-html
          python -m coverage xml -o .cov\total.xml

      - name: Upload coverage results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          path: .cov/total-html
          name: html-total-coverage

# # =================================================================================================
# # vvvvvvvvvvvvvvvvvvvvvvvvvvvvvv    RUNNING ON SELF-HOSTED RUNNER    vvvvvvvvvvvvvvvvvvvvvvvvvvvvvv
# # =================================================================================================

  tests-linux:
    name: Linux tests
    needs: smoke-tests
    runs-on: [ self-hosted, Linux, pyaedt-toolkit ]
    permissions:
      contents: read
    env:
      ANSYSEM_ROOT252: '/usr/ansys_inc/v252/AnsysEM'
      ANS_NODEPCHECK: '1'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.MAIN_PYTHON_VERSION }}

      - name: Create Python venv
        run: |
          python -m venv .venv

      - name: Install packages for testing
        run: |
          source .venv/bin/activate
          pip install .[tests]

      - name: Toolkit REST API testing
        timeout-minutes: 30
        run: |
          source .venv/bin/activate
          pytest -v -m rest

      - name: Toolkit backend API testing
        timeout-minutes: 30
        run: |
          source .venv/bin/activate
          pytest -v -m backend

      - name: Toolkit frontend testing
        timeout-minutes: 30
        run: |
          source .venv/bin/activate
          pytest -v -m frontend

  build-library:
    name: Build library artifacts
    needs: [doc-build, tests-windows, tests-linux]
    runs-on: ubuntu-latest
    permissions:
      attestations: write   # Required to create and publish package attestations (SLSA provenance)
      contents: read        # Required to read repository content for packaging
      id-token: write       # Required for OIDC token generation (for provenance signing)
    steps:
      - name: Build library source and wheel artifacts
        uses: ansys/actions/build-library@2a2b198b65c63adb69c0d032d180e4dc728d4809 # v10.2.9
        with:
          library-name: ${{ env.LIBRARY_NAME }}
          python-version: ${{ env.MAIN_PYTHON_VERSION }}
          attest-provenance: true
