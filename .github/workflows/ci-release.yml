name: CI - Release
on:
  push:
    tags:
      - "v*.*.*"

env:
  ANSYSLMD_LICENSE_FILE: ${{ format('1055@{0}', secrets.LICENSE_SERVER) }}
  MAIN_PYTHON_VERSION: '3.10'
  DOCUMENTATION_CNAME: 'etk.docs.pyansys.com'
  LIBRARY_NAME: 'ansys-pyetk'
  ON_CI: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:

  update-changelog:
    name: "Update CHANGELOG (on release)"
    if: github.event_name == 'push' && contains(github.ref, 'refs/tags')
    runs-on: ubuntu-latest
    permissions:
      contents: write        # Required to commit and push changelog updates to the repository
      pull-requests: write   # Required to create pull requests with changelog updates
    steps:
      - uses: ansys/actions/doc-deploy-changelog@2a2b198b65c63adb69c0d032d180e4dc728d4809 # v10.2.9
        with:
          token: ${{ secrets.PYANSYS_CI_BOT_TOKEN }}
          bot-user: ${{ secrets.PYANSYS_CI_BOT_USERNAME }}
          bot-email: ${{ secrets.PYANSYS_CI_BOT_EMAIL }}
          use-upper-case: true

  code-style:
    name: Code style check
    runs-on: ubuntu-latest
    permissions:
      contents: read   # Required to read code files for style checking
    steps:
      - uses: ansys/actions/code-style@2a2b198b65c63adb69c0d032d180e4dc728d4809 # v10.2.9
        with:
          python-version: ${{ env.MAIN_PYTHON_VERSION }}
          use-python-cache: false

  build-application-windows:
    name: Build Windows application
    runs-on: windows-latest
    needs: code-style
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/build-windows-app
        with:
          artifact-name: 'PyETK-Installer-Windows'
          python-version: ${{ env.MAIN_PYTHON_VERSION }}

  build-application-linux-debian:
    name: Build Linux application - Ubuntu ${{ matrix.os }}
    runs-on: ubuntu-${{ matrix.os }}
    needs: code-style
    strategy:
      matrix:
        os: [ "22.04", "24.04" ]
      fail-fast: false
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/build-linux-app
        with:
          artifact-name: 'PyETK-Installer-ubuntu_${{ matrix.os }}'
          python-version: ${{ env.MAIN_PYTHON_VERSION }}
          ubuntu-version: ${{ matrix.os }}

  doc-style:
    name: Documentation style check
    runs-on: ubuntu-latest
    permissions:
      contents: read   # Required to read documentation files for style checking
    steps:
      - name: Check documentation style
        uses: ansys/actions/doc-style@2a2b198b65c63adb69c0d032d180e4dc728d4809 # v10.2.9
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fail-level: 'warning'

  smoke-tests:
    name: Build and smoke tests
    needs: code-style
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os : [windows-latest, ubuntu-latest]
        python-version: ['3.10', '3.11', '3.12', '3.13']
    permissions:
      attestations: write   # Required to create and publish build attestations (SLSA provenance)
      contents: read        # Required to read repository content for building
      id-token: write       # Required for OIDC token generation (for provenance signing)
    steps:
      - uses: ansys/actions/build-wheelhouse@2a2b198b65c63adb69c0d032d180e4dc728d4809 # v10.2.9
        with:
          library-name: ${{ env.LIBRARY_NAME }}
          operating-system: ${{ matrix.os }}
          python-version: ${{ matrix.python-version }}
          whitelist-license-check: 'fpdf2 PySide6 PySide6_Addons PySide6_Essentials shiboken6'

  doc-build:
    name: Documentation build
    needs: doc-style
    runs-on: [self-hosted, Windows, pyaedt-toolkit]
    permissions:
      contents: read
    steps:
      - name: Build documentation
        uses: ansys/actions/doc-build@2a2b198b65c63adb69c0d032d180e4dc728d4809 # v10.2.9
        with:
          add-pdf-html-docs-as-assets: true
          check-links: false
          python-version: ${{ env.MAIN_PYTHON_VERSION }}
          sphinxopts: '-j auto --color -w build_errors.txt'
          use-python-cache: false

  build-library:
    name: Build library artifacts
    needs: doc-build
    runs-on: [self-hosted, Linux, pyaedt-toolkit]
    permissions:
      attestations: write   # Required to create and publish package attestations (SLSA provenance)
      contents: read        # Required to read repository content for packaging
      id-token: write       # Required for OIDC token generation (for provenance signing)
    steps:
      - name: Build library
        uses: ansys/actions/build-library@2a2b198b65c63adb69c0d032d180e4dc728d4809 # v10.2.9
        with:
          library-name: ${{ env.LIBRARY_NAME }}
          python-version: ${{ env.MAIN_PYTHON_VERSION }}
          attest-provenance: true

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [build-library, build-application-windows, build-application-linux-debian]
    permissions:
      id-token: write # Needed for trusted publishing OIDC
      contents: write # Needed for releasing to GitHub
    steps:
      - name: Download the library artifacts from build-library step
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: ${{ env.LIBRARY_NAME }}-artifacts
          path: ${{ env.LIBRARY_NAME }}-artifacts

      - name: Release to PyPI using trusted publisher
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          repository-url: "https://upload.pypi.org/legacy/"
          print-hash: true
          packages-dir: ${{ env.LIBRARY_NAME }}-artifacts
          skip-existing: false

      - name: Release to GitHub
        uses: ansys/actions/release-github@2a2b198b65c63adb69c0d032d180e4dc728d4809 # v10.2.9
        with:
          library-name: ${{ env.LIBRARY_NAME }}
          token: ${{ secrets.GITHUB_TOKEN }}
          add-artifact-attestation-notes: true
          generate_release_notes: false

      - name: "Download installer artifacts"
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: PyETK-Installer-*
          path: /tmp/artifacts
          merge-multiple: false

      - name: List artifacts
        run: ls -R /tmp/artifacts

      - uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: |
            /tmp/artifacts/PyETK-Installer-Windows/*.exe
            /tmp/artifacts/PyETK-Installer-ubuntu_22.04/*.zip
            /tmp/artifacts/PyETK-Installer-ubuntu_24.04/*.zip

  doc-deploy-stable:
    name: Deploy stable documentation
    runs-on: ubuntu-latest
    needs: release
    permissions:
      contents: write # Needed to update files on the gh-pages branch
    steps:
      - uses: ansys/actions/doc-deploy-stable@2a2b198b65c63adb69c0d032d180e4dc728d4809 # v10.2.9
        with:
          cname: ${{ env.DOCUMENTATION_CNAME }}
          token: ${{ secrets.GITHUB_TOKEN }}
          bot-user: ${{ secrets.PYANSYS_CI_BOT_USERNAME }}
          bot-email: ${{ secrets.PYANSYS_CI_BOT_EMAIL }}