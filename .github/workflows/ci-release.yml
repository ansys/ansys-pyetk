name: CI - Release
on:
  push:
    tags:
      - "v*.*.*"

env:
  MAIN_PYTHON_VERSION: '3.10'
  DOCUMENTATION_CNAME: 'etk.docs.pyansys.com'
  LIBRARY_NAME: 'ansys-pyetk'
  ON_CI: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:

  update-changelog:
    name: "Update CHANGELOG (on release)"
    if: github.event_name == 'push' && contains(github.ref, 'refs/tags')
    runs-on: ubuntu-latest
    permissions:
      contents: write        # Required to commit and push changelog updates to the repository
      pull-requests: write   # Required to create pull requests with changelog updates
    steps:
      - uses: ansys/actions/doc-deploy-changelog@41f86da4c9ead510db9135e428e33df9cc6f92e1 # v10.2.3
        with:
          token: ${{ secrets.PYANSYS_CI_BOT_TOKEN }}
          bot-user: ${{ secrets.PYANSYS_CI_BOT_USERNAME }}
          bot-email: ${{ secrets.PYANSYS_CI_BOT_EMAIL }}
          use-upper-case: true

  code-style:
    name: Code style check
    runs-on: ubuntu-latest
    permissions:
      contents: read   # Required to read code files for style checking
    steps:
      - uses: ansys/actions/code-style@41f86da4c9ead510db9135e428e33df9cc6f92e1 # v10.2.3
        with:
          python-version: ${{ env.MAIN_PYTHON_VERSION }}
          use-python-cache: false

  build-application-windows:
    name: Build Windows application
    runs-on: windows-latest
    needs: code-style
    permissions:
      contents: read
    steps:
      - uses: ./.github/actions/build-windows-app
        with:
          artifact-name: 'PyETK-Installer-Windows'
          python-version: ${{ env.MAIN_PYTHON_VERSION }}

  build-application-linux-debian:
    name: Build Linux application - Ubuntu ${{ matrix.os }}
    runs-on: ubuntu-${{ matrix.os }}
    needs: code-style
    strategy:
      matrix:
        os: [ "22.04", "24.04" ]
      fail-fast: false
    permissions:
      contents: read
    steps:
      - uses: ./.github/actions/build-linux-app
        with:
          artifact-name: 'PyETK-Installer-ubuntu_${{ matrix.os }}'
          python-version: ${{ env.MAIN_PYTHON_VERSION }}
          ubuntu-version: ${{ matrix.os }}

  doc-style:
    name: Documentation style check
    runs-on: ubuntu-latest
    permissions:
      contents: read   # Required to read documentation files for style checking
    steps:
      - name: Check documentation style
        uses: ansys/actions/doc-style@41f86da4c9ead510db9135e428e33df9cc6f92e1 # v10.2.3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fail-level: 'warning'

  doc-build:
    name: Documentation build
    needs: doc-style
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Build documentation
        uses: ansys/actions/doc-build@41f86da4c9ead510db9135e428e33df9cc6f92e1 # v10.2.3
        with:
          add-pdf-html-docs-as-assets: true
          check-links: false
          python-version: ${{ env.MAIN_PYTHON_VERSION }}
          sphinxopts: '-j auto --color -w build_errors.txt'
          use-python-cache: false

  build-library:
    name: Build library artifacts
    needs: doc-build
    runs-on: ubuntu-latest
    permissions:
      attestations: write   # Required to create and publish package attestations (SLSA provenance)
      contents: read        # Required to read repository content for packaging
      id-token: write       # Required for OIDC token generation (for provenance signing)
    steps:
      - name: Build library
        uses: ansys/actions/build-library@c2fa7c93f6883114e0e643599431b33d29f0b13f # v10.1.4
        with:
          library-name: ${{ env.LIBRARY_NAME }}
          python-version: ${{ env.MAIN_PYTHON_VERSION }}
          attest-provenance: true

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: build-library
    permissions:
      id-token: write # Needed for trusted publishing OIDC
      contents: write # Needed for releasing to GitHub
    steps:
      - name: Download the library artifacts from build-library step
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: ${{ env.LIBRARY_NAME }}-artifacts
          path: ${{ env.LIBRARY_NAME }}-artifacts

      - name: Release to GitHub
        uses: ansys/actions/release-github@c2fa7c93f6883114e0e643599431b33d29f0b13f # v10.1.4
        with:
          library-name: ${{ env.LIBRARY_NAME }}
          token: ${{ secrets.GITHUB_TOKEN }}
          add-artifact-attestation-notes: true
          generate_release_notes: false

      - name: "Download all artifacts that got generated in the CI/CD"
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          path: /tmp/artifacts

      - name: List artifacts
        run: ls -R /tmp/artifacts

      - uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          files: |
            /tmp/artifacts/PyETK-Installer-Windows/*.exe

      - uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          files: |
            /tmp/artifacts/PyETK-Installer-ubuntu_22.04/*.zip

      - uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          files: |
            /tmp/artifacts/PyETK-Installer-ubuntu_24.04/*.zip

  doc-deploy-stable:
    name: Deploy stable documentation
    runs-on: ubuntu-latest
    needs: release
    permissions:
      contents: write # Needed to update files on the gh-pages branch
    steps:
      - uses: ansys/actions/doc-deploy-stable@41f86da4c9ead510db9135e428e33df9cc6f92e1 # v10.2.3
        with:
          cname: ${{ env.DOCUMENTATION_CNAME }}
          token: ${{ secrets.GITHUB_TOKEN }}
          bot-user: ${{ secrets.PYANSYS_CI_BOT_USERNAME }}
          bot-email: ${{ secrets.PYANSYS_CI_BOT_EMAIL }}